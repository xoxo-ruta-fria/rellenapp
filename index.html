input:checked+.sli:before{transform:translateX(24px);}
input[type=number]{-moz-appearance:textfield;}

const configOk = () => SCRIPT_URL && SCRIPT_URL.startsWith('https://script.google.com');

async function apiPost(accion, body={}){
  if(!configOk()) throw new Error('Sin configurar');
  const res = await fetch(SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({accion, ...body})
  });
  return res.json();
}

async function apiGet(accion, params={}){
  if(!configOk()) throw new Error('Sin configurar');
  const qs = new URLSearchParams({accion,...params}).toString();
  const res = await fetch(`${SCRIPT_URL}?${qs}`);
  return res.json();
}

const HOY    = new Date().toISOString().slice(0,10);
const AYER   = new Date(Date.now()-86400000).toISOString().slice(0,10);
const esFDS  = f => { const d=new Date(f+'T12:00:00').getDay(); return d===5||d===6; };
const diaCorto  = f => new Date(f+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'2-digit',month:'short'});
const diaNombre = f => new Date(f+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'2-digit',month:'long'});
const tipoRel   = (f,ov) => ov!==null?ov:(esFDS(f)?'FS':'ES');
const stockRel  = (ins,tipo) => tipo==='FS'?ins.stockFS:ins.stockES;
const fmt$      = n => n===0?'—':'$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:2});
const fmt2      = n => Number(n)%1===0?String(Math.round(Number(n))):Number(n).toFixed(2);

function calcDia(insumos, reg, tipo){
  return insumos.map(ins=>{
    const rel  = stockRel(ins,tipo);
    const ini  = reg?.stockInicio?.[ins.id]??0;
    const rec  = reg?.recibido?.[ins.id]??0;
    const fin  = reg?.conteoFin?.[ins.id]??null;
    const disp = ini+rec;
    const cons = fin!==null?Math.max(0,disp-fin):null;
    const pedir= Math.max(0,rel-(fin!==null?fin:ini));
    return {...ins,rel,ini,rec,disp,fin,cons,pedir};
  });
}

// Import Excel dual format
function importarExcel(file,callback){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let resultado=null;
      for(const sn of wb.SheetNames){
        const ws=wb.Sheets[sn];
        const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        let hiA=-1,hiB=-1;
        for(let i=0;i<Math.min(data.length,15);i++){
          const row=data[i].map(v=>String(v).trim().toUpperCase());
          if(row[0]==='CLAVE'&&row.findIndex(h=>h.includes('EXISTENCIA')&&h.includes('LLENAR'))>0){hiA=i;break;}
          if(row[1]==='CLAVE'&&(row[4]==='EXISTENCIAS REALES'||row[4].includes('EXISTENCIAS'))){hiB=i;break;}
        }
        if(hiA===-1&&hiB===-1) continue;
        const res={};let n=0;
        if(hiA>=0){
          const hdrs=data[hiA].map(h=>String(h).toUpperCase());
          const cFin=hdrs.findIndex(h=>h.includes('EXISTENCIA')&&h.includes('LLENAR'));
          for(let i=hiA+1;i<data.length;i++){
            const row=data[i];const cs=String(row[0]).trim();const val=row[cFin];
            if(!cs||val===''||val===null) continue;
            const num=parseFloat(val);if(isNaN(num)||num<0) continue;
            const ins=INSUMOS_BASE.find(x=>x.codigo===cs);if(!ins) continue;
            res[ins.id]=num;n++;
          }
        } else {
          for(let i=hiB+1;i<data.length;i++){
            const row=data[i];const cr=row[1];const val=row[4];
            if(cr===''||cr===null) continue;
            let cs='';try{cs=String(Math.round(parseFloat(String(cr))));}catch{cs=String(cr).replace('.0','').trim();}
            if(!cs||cs==='NaN') continue;
            if(val===''||val===null) continue;
            const num=parseFloat(val);if(isNaN(num)||num<0) continue;
            const ins=INSUMOS_BASE.find(x=>x.codigo===cs);if(!ins) continue;
            res[ins.id]=num;n++;
          }
        }
        if(n>0){resultado={ok:true,data:res,n,fmt:hiA>=0?'RellenApp':'Existencias Prod'};break;}
      }
      if(!resultado){callback({error:'No reconocí el formato.'});return;}
      callback(resultado);
    }catch(err){callback({error:'Error: '+err.message});}
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════════════
// LECTOR DE REMISIONES PDF
// Lee columna 1 (clave) y columna 3 (cantidad)
// Soporta múltiples PDFs — siempre suma, nunca reemplaza
// ═══════════════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function leerRemisionPDF(file){
  const buffer  = await file.arrayBuffer();
  const pdf     = await pdfjsLib.getDocument({data: buffer}).promise;
  const lineas  = [];

  for(let p=1; p<=pdf.numPages; p++){
    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Agrupar items por posición Y (misma línea = mismo Y aproximado)
    const porY = {};
    content.items.forEach(item=>{
      const y = Math.round(item.transform[5]);
      if(!porY[y]) porY[y]=[];
      porY[y].push({x: item.transform[4], txt: item.str.trim()});
    });

    // Ordenar líneas por Y descendente (PDF origin bottom-left)
    Object.keys(porY).sort((a,b)=>b-a).forEach(y=>{
      const fila = porY[y].sort((a,b)=>a.x-b.x).map(i=>i.txt).filter(t=>t!=='');
      if(fila.length>0) lineas.push(fila);
    });
  }

  // ── Detectar formato ──────────────────────────────────────
  // Formato A — REMISIÓN: Clave | Descripción | Cantidad | Unidad | Precio | Importe | Iva | Total
  // Formato B — PEDIDO:   Clave | Descripción | Cantidad | Unidad
  // En ambos casos: col 0 = clave, buscamos cantidad como primer número > 0 después de col 0
  // La diferencia es que en Remisión hay columnas de precio después de la cantidad
  // Detectamos el formato buscando si hay columna de precio ($ o número grande)

  const resultado = {};
  let n = 0;

  lineas.forEach(fila=>{
    if(fila.length < 2) return;

    // Col 0 debe ser la clave numérica
    const claveRaw = fila[0];
    const claveNum = parseInt(claveRaw);
    if(isNaN(claveNum) || claveNum < 100) return;
    const claveStr = String(claveNum);

    // Buscar en catálogo de insumos
    const ins = INSUMOS_BASE.find(x=>x.codigo===claveStr);
    if(!ins) return;

    // Buscar cantidad: primer número válido (>0, <10000) en las columnas restantes
    // En PEDIDO está en col 2 (después de descripción)
    // En REMISIÓN también está en col 2 pero después hay precio, importe, etc.
    // Estrategia: buscar el primer número flotante válido que no sea un precio grande
    let cantidad = null;
    for(let i=1; i<fila.length; i++){
      const txt = fila[i].replace(/[$,]/g,'').trim();
      const v   = parseFloat(txt);
      if(!isNaN(v) && v > 0 && v < 5000){
        // Descartar si parece precio (número muy grande para una cantidad)
        // Las cantidades de insumos raramente superan 500 unidades
        cantidad = v;
        break;
      }
    }
    if(cantidad === null) return;

    // Sumar — siempre acumula aunque venga de múltiples documentos
    resultado[ins.id] = (resultado[ins.id]||0) + cantidad;
    n++;
  });

  // Detectar tipo de documento para mostrar en el detalle
  const textoCompleto = lineas.flat().join(' ').toUpperCase();
  const tipo = textoCompleto.includes('REMISIÓN') || textoCompleto.includes('REMISION')
    ? 'Remisión'
    : textoCompleto.includes('PEDIDO')
    ? 'Pedido'
    : 'Documento';

  return {ok: n>0, data: resultado, n, nombre: file.name, tipo};
}

async function procesarRemisiones(files, callback){
  const acumulado = {};
  const detalle   = [];
  let totalItems  = 0;
  let errores     = [];

  for(const file of files){
    try{
      const res = await leerRemisionPDF(file);
      if(res.ok){
        Object.entries(res.data).forEach(([id,cant])=>{
          acumulado[id] = (acumulado[id]||0) + cant;
        });
        totalItems += res.n;
        detalle.push({nombre: file.name, items: res.n, data: res.data, tipo: res.tipo||'Documento'});
      } else {
        errores.push(file.name+': sin insumos reconocidos');
      }
    }catch(e){
      errores.push(file.name+': '+e.message);
    }
  }

  if(Object.keys(acumulado).length===0){
    callback({error: 'No se reconocieron insumos en los PDFs. Verifica que sean remisiones digitales.'});
    return;
  }
  callback({ok:true, data:acumulado, totalItems, detalle, errores});
}

function exportarReporteSemanal(registros, insumos, rutaNombre){
  // Obtener lunes y domingo de la semana anterior
  const hoy   = new Date();
  const diaSem = hoy.getDay(); // 0=Dom
  const lunes  = new Date(hoy);
  lunes.setDate(hoy.getDate() - (diaSem===0?6:diaSem-1) - 7);
  const domingo = new Date(lunes);
  domingo.setDate(lunes.getDate() + 6);

  const fechasSemanales = [];
  for(let d=new Date(lunes); d<=domingo; d.setDate(d.getDate()+1)){
    fechasSemanales.push(d.toISOString().slice(0,10));
  }

  const wb = XLSX.utils.book_new();

  // Hoja 1: Resumen por día
  const resumenRows = [
    [`REPORTE SEMANAL · ${rutaNombre||'RUTA FRÍA'} · SUCURSAL XOXO`,'','',''],
    [`Semana: ${lunes.toLocaleDateString('es-MX',{day:'2-digit',month:'long'})} al ${domingo.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'})}`,'','',''],
    ['','','',''],
    ['FECHA','DÍA','INSUMOS RECIBIDOS','COSTO TOTAL'],
  ];

  let totalSemana = 0;
  const detallesPorDia = [];

  fechasSemanales.forEach(f=>{
    const reg = registros[f];
    const rem = reg?.remision;
    const diaN = new Date(f+'T12:00:00').toLocaleDateString('es-MX',{weekday:'long'});
    if(rem&&rem.items&&rem.items.length>0){
      resumenRows.push([f, diaN, rem.items.length, rem.total>0?rem.total:'—']);
      totalSemana += rem.total||0;
      detallesPorDia.push({fecha:f, dia:diaN, remision:rem});
    } else {
      resumenRows.push([f, diaN, 'Sin remisión', '—']);
    }
  });

  resumenRows.push(['','','TOTAL SEMANA', totalSemana>0?totalSemana:'—']);

  const wsResumen = XLSX.utils.aoa_to_sheet(resumenRows);
  wsResumen['!cols']=[{wch:13},{wch:14},{wch:20},{wch:14}];
  wsResumen['!merges']=[{s:{r:0,c:0},e:{r:0,c:3}},{s:{r:1,c:0},e:{r:1,c:3}}];
  XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen Semanal');

  // Hoja 2+: Una hoja por día con detalle
  detallesPorDia.forEach(({fecha:f, dia, remision:rem})=>{
    const rows = [
      [`${dia.toUpperCase()} ${f}`,'','','',''],
      ['CLAVE','NOMBRE','CANT.','PRECIO','SUBTOTAL'],
      ...rem.items.map(i=>[i.codigo,i.nombreCorto||i.nombre,i.cantidad,i.precio>0?i.precio:'—',i.precio>0?i.subtotal:'—']),
      ['','','','TOTAL',rem.total>0?rem.total:'—'],
    ];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:12},{wch:22},{wch:7},{wch:11},{wch:11}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:4}}];
    const nombreHoja = new Date(f+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'2-digit'});
    XLSX.utils.book_append_sheet(wb, ws, nombreHoja);
  });

  const semStr = `${lunes.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit'})}`;
  XLSX.writeFile(wb, `ReporteSemanal_${semStr}_${(rutaNombre||'RutaFria').replace(/\s/g,'')}.xlsx`);
}

// COMPONENTE: BOTÓN NUMÉRICO

function NumBtn({label,onPress,color='#1e3a5f',textColor='#e2ecf8'}){
  return (
    <button
      onTouchStart={e=>e.currentTarget.style.transform='scale(.9)'}
      onTouchEnd={e=>{e.currentTarget.style.transform='scale(1)';onPress();}}
      onClick={onPress}
      style={{width:52,height:52,borderRadius:12,border:`2px solid ${color}55`,background:color,
        color:textColor,fontSize:22,fontWeight:800,display:'flex',alignItems:'center',
        justifyContent:'center',transition:'transform .1s',flexShrink:0}}>
      {label}
    </button>
  );
}

// COMPONENTE: CARD DE INSUMO — 4 FASES
// ═══════════════════════════════════════════════════════
function InsCard({ins,fase,reg,cerrado,tipo,onSet}){
  const bajo  = ins.fin!==null&&ins.fin<ins.rel*0.25;
  const ok    = ins.fin!==null&&ins.fin>=ins.rel*0.25;
  const val   = fase==='recibido'?(reg.recibido?.[ins.id]??0):(reg.conteoFin?.[ins.id]??0);

  const cambiar = (campo, delta) => {
    if(cerrado) return;
    const actual = campo==='recibido'?(reg.recibido?.[ins.id]??0):(reg.conteoFin?.[ins.id]??0);
    onSet(campo, ins.id, Math.max(0,(parseFloat(actual)||0)+delta));
  };

  // Calcular existencia final = inicio + recibido - consumo
  const existenciaFinal = ins.fin !== null ? ins.fin : (ins.disp - (ins.cons||0));

  return (
    <div style={{background:'#0d1b33',borderRadius:14,
      border:`1.5px solid ${bajo?'#7f1d1d':ok?'#14532d':'#1a3050'}`,
      padding:'14px',marginBottom:10}}>

      {/* Cabecera */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div style={{flex:1,paddingRight:8}}>
          <div style={{fontWeight:700,fontSize:15,lineHeight:1.25}}>{ins.nombreCorto}</div>
          <div style={{fontSize:10,color:'#475569',marginTop:3,fontFamily:'DM Mono,monospace'}}>
            {ins.codigo} · {ins.unidad} · Rel <span style={{color:tipo==='FS'?'#fb923c':'#93c5fd',fontWeight:700}}>{ins.rel}</span>
          </div>
        </div>
        <div style={{fontSize:22}}>{bajo?'⚠️':ok?'✅':''}</div>
      </div>

      {/* ── FASE: EXISTENCIAS INICIO ── */}
      {fase==='inicio'&&(
        <div style={{background:'#08101e',borderRadius:10,padding:'12px 14px'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:8,letterSpacing:.5}}>🌅 EXISTENCIAS INICIO DEL DÍA</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <div style={{fontSize:9,color:'#475569',marginBottom:3}}>CANTIDAD</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:900,fontSize:32,color:'#94a3b8',lineHeight:1}}>{fmt2(ins.ini)}</div>
              <div style={{fontSize:10,color:'#475569',marginTop:2}}>{ins.unidad}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:'#475569',marginBottom:3}}>ORIGEN</div>
              <div style={{fontSize:11,color:'#64748b',lineHeight:1.5}}>
                {ins.ini>0
                  ? <span style={{color:'#4ade80'}}>✓ Conteo final de ayer</span>
                  : <span style={{color:'#f87171'}}>Sin datos de ayer</span>}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── FASE: RECIBIDO ── */}
      {fase==='recibido'&&(
        <div>
          <div style={{background:'#08101e',borderRadius:10,padding:'10px 12px',marginBottom:10,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#475569',marginBottom:2}}>INICIO</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16,color:'#94a3b8'}}>{fmt2(ins.ini)}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#60a5fa',marginBottom:2}}>RECIBIDO</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16,color:'#60a5fa'}}>{fmt2(ins.rec)}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#4ade80',marginBottom:2}}>DISPONIBLE</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:16,color:'#4ade80'}}>{fmt2(ins.disp)}</div>
            </div>
          </div>
          {!cerrado&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'#60a5fa',marginBottom:8,letterSpacing:.5}}>📥 CAPTURAR RECIBIDO HOY</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <NumBtn label="−" onPress={()=>cambiar('recibido',-1)} color="#1a3050"/>
                <NumBtn label="−½" onPress={()=>cambiar('recibido',-.5)} color="#1a3050" textColor="#94a3b8"/>
                <input type="number" inputMode="decimal" min="0" step="0.5"
                  value={reg.recibido?.[ins.id]??''}
                  onChange={e=>onSet('recibido',ins.id,Math.max(0,parseFloat(e.target.value)||0))}
                  style={{flex:1,height:52,borderRadius:12,border:'2px solid #3b82f6',

              </div>
            </div>
          )}
        </div>
      )}

      {/* ── FASE: CONTEO ── */}
      {fase==='conteo'&&(
        <div>
          <div style={{background:'#08101e',borderRadius:10,padding:'10px 12px',marginBottom:10,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#475569',marginBottom:2}}>DISPONIBLE</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:15,color:'#94a3b8'}}>{fmt2(ins.disp)}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#fb923c',marginBottom:2}}>CONTEO</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:15,color:bajo?'#f87171':'#fb923c'}}>{ins.fin!==null?fmt2(ins.fin):'—'}</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#94a3b8',marginBottom:2}}>CONSUMO</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:15,color:ins.cons>0?'#fb923c':'#475569'}}>{ins.cons!==null?fmt2(ins.cons):'—'}</div>
            </div>
          </div>
          {!cerrado&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'#fb923c',marginBottom:8,letterSpacing:.5}}>🔢 CAPTURAR CONTEO FÍSICO</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <NumBtn label="−" onPress={()=>cambiar('conteoFin',-1)} color="#1a3050"/>
                <NumBtn label="−½" onPress={()=>cambiar('conteoFin',-.5)} color="#1a3050" textColor="#94a3b8"/>
                <input type="number" inputMode="decimal" min="0" step="0.5"
                  value={reg.conteoFin?.[ins.id]??''}
                  onChange={e=>onSet('conteoFin',ins.id,Math.max(0,parseFloat(e.target.value)||0))}
                  style={{flex:1,height:52,borderRadius:12,border:'2px solid #f97316',
                    background:'#162035',color:bajo?'#f87171':'#fb923c',fontSize:28,fontWeight:800,
                    textAlign:'center',fontFamily:'DM Mono,monospace',padding:0}}
                  placeholder="—"/>
                <NumBtn label="+½" onPress={()=>cambiar('conteoFin',.5)} color="#1e3a5f" textColor="#94a3b8"/>
                <NumBtn label="+" onPress={()=>cambiar('conteoFin',1)} color="#c2410c" textColor="#fff"/>
              </div>
              {ins.cons!==null&&(
                <div style={{marginTop:8,fontSize:11,color:'#64748b',textAlign:'center',fontFamily:'DM Mono,monospace'}}>
                  Consumo: <span style={{color:'#fb923c',fontWeight:700}}>{fmt2(ins.cons)} {ins.unidad}</span>
                  {ins.precio>0&&<span style={{color:'#475569',marginLeft:6}}>· {fmt$(ins.cons*ins.precio)}</span>}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── FASE: EXISTENCIAS FINAL / CIERRE ── */}
      {fase==='cierre'&&(
        <div style={{background:'#0a1a10',borderRadius:10,padding:'12px 14px',border:'1px solid #166534'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#4ade80',marginBottom:10,letterSpacing:.5}}>🌙 EXISTENCIAS FINAL DEL DÍA</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div style={{textAlign:'center',background:'#08101e',borderRadius:8,padding:'10px 6px'}}>
              <div style={{fontSize:9,color:'#475569',marginBottom:3}}>INICIO + RECIBIDO</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:18,color:'#94a3b8'}}>{fmt2(ins.disp)}</div>
            </div>
            <div style={{textAlign:'center',background:'#08101e',borderRadius:8,padding:'10px 6px'}}>
              <div style={{fontSize:9,color:'#fb923c',marginBottom:3}}>CONSUMO</div>
              <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:18,color:'#fb923c'}}>{ins.cons!==null?fmt2(ins.cons):'—'}</div>

          <div style={{textAlign:'center',background:'#0c2a18',borderRadius:10,padding:'12px',border:'1px solid #166534'}}>

    </div>
  );
}

// ═══════════════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════════════
function App(){
  const local  = loadLocal();
  const [rutaId, setRutaId] = React.useState(null); // null = menú principal
  const rutaConfig = RUTAS_CONFIG.find(r=>r.id===rutaId)||RUTAS_CONFIG[0];
  const INSUMOS    = rutaConfig ? rutaConfig.insumos : INSUMOS_BASE;
  const [db,    setDb]     = React.useState(()=>local||{insumos:INSUMOS_BASE.map(i=>({...i})),registros:{}});
  const [fecha, setFecha]  = React.useState(HOY);
  const [vista, setVista]  = React.useState('dia');
  const [fase,  setFase]   = React.useState('inicio');
  const [busq,  setBusq]   = React.useState('');
  const [toast, setToast]  = React.useState(null);
  const [modEdit,setModEdit]= React.useState(null);
  const [formEdit,setFormEdit]=React.useState({});
  const [showCierre,setShowCierre]=React.useState(false);
  const [importando,setImportando]=React.useState(false);
  const [importRes,setImportRes]=React.useState(null);
  const [showDatePick,setShowDatePick]=React.useState(false);
  const [syncing,setSyncing]=React.useState(false);
  const [syncStatus,setSyncStatus]=React.useState(null); // 'ok'|'error'|null
  const [showConfig,setShowConfig]=React.useState(false);
  const [scriptUrlInput,setScriptUrlInput]=React.useState(SCRIPT_URL);
  const [scriptUrl,setScriptUrl]=React.useState(SCRIPT_URL);
  const fileRef=React.useRef();
  const pdfRef=React.useRef();
  const saveTimer=React.useRef(null);
  const [procesandoPDF,setProcesandoPDF]=React.useState(false);
  const [remisiones,setRemisiones]=React.useState([]);
  const [showRemisiones,setShowRemisiones]=React.useState(false);

  // Guardar local cada vez que cambia db
  React.useEffect(()=>{
    saveLocal(db, rutaId);
    // Auto-sync con Sheets si hay URL configurada
    if(configOk()){
      clearTimeout(saveTimer.current);
      saveTimer.current=setTimeout(()=>syncDia(fecha,db.registros[fecha]||{}),1500);
    }
  },[db]);

  // Cargar datos de Sheets al abrir y al cambiar fecha
  React.useEffect(()=>{
    if(configOk()) cargarDia(fecha);
  },[fecha, scriptUrl]);

  // Load route-specific data when ruta changes
  React.useEffect(()=>{
    if(!rutaId) return;
    const key = rutaId==='fria' ? 'rellenapp_xoxo_v3' : 'rellenapp_xoxo_'+rutaId+'_v1';
    try{
      const s=localStorage.getItem(key);
      if(s){ const d=JSON.parse(s); setDb(d); }
      else { setDb({insumos:rutaConfig.insumos.map(i=>({...i})),registros:{}}); }
    }catch{ setDb({insumos:rutaConfig.insumos.map(i=>({...i})),registros:{}}); }
  },[rutaId]);

  // Auto-transferir conteo del día anterior → inicio del día activo
  React.useEffect(()=>{
    // Buscar el día anterior a la fecha activa
    const fechaAnterior = new Date(fecha+'T12:00:00');
    fechaAnterior.setDate(fechaAnterior.getDate()-1);
    const diaAnterior = fechaAnterior.toISOString().slice(0,10);
    const regHoy = db.registros[fecha];
    const regAyer = db.registros[diaAnterior];
    // Solo transferir si el día activo no tiene stock inicio aún
    // y el día anterior tiene conteo final
    if(!regHoy?.stockInicio || Object.keys(regHoy.stockInicio||{}).length===0){
      if(regAyer?.conteoFin && Object.keys(regAyer.conteoFin).length>0){
        setDb(d=>({...d,registros:{...d.registros,[fecha]:{...d.registros[fecha],stockInicio:{...regAyer.conteoFin}}}}));
      }
    }
  },[fecha, db.registros]);

  // ── SINCRONIZACIÓN ──────────────────────────────────
  const cargarDia = async(f) => {
    if(!configOk()) return;
    setSyncing(true);
    try{
      const res = await apiGet('leerRegistro',{fecha:f});
      if(res.ok && res.datos && Object.keys(res.datos.stockInicio||{}).length+Object.keys(res.datos.recibido||{}).length+Object.keys(res.datos.conteoFin||{}).length > 0){
        setDb(d=>({...d,registros:{...d.registros,[f]:{...res.datos}}}));
      }
      setSyncStatus('ok');
    }catch(e){
      setSyncStatus('error');
    }finally{ setSyncing(false); }
  };

  // Normaliza cualquier formato de fecha a YYYY-MM-DD
  const normalizarFecha = (f) => {
    if(/^\d{4}-\d{2}-\d{2}$/.test(f)) return f; // ya está bien
    try{
      const d = new Date(f);
      if(!isNaN(d)) return d.toISOString().slice(0,10);
    }catch{}
    return f;
  };

  const cargarTodo = async() => {
    if(!configOk()){ showToast('⚠️ Configura la URL primero','warn'); return; }
    setSyncing(true);
    try{
      const res=await apiGet('leerTodos');
      if(res.ok&&res.registros){
        // Normalizar claves de fecha
        const normalized={};
        Object.entries(res.registros).forEach(([k,v])=>{
          const fechaNorm = normalizarFecha(k);
          normalized[fechaNorm]=v;
        });
        setDb(d=>({...d,registros:{...d.registros,...normalized}}));
        showToast(`✅ ${Object.keys(normalized).length} días sincronizados`);
        setSyncStatus('ok');
      }
    }catch(e){ showToast('❌ Error al sincronizar','err'); setSyncStatus('error'); }
    finally{ setSyncing(false); }
  };

  const syncDia = async(f, regData) => {
    if(!configOk()) return;
    try{
      await apiPost('guardarRegistro',{fecha:f, datos:regData});
      setSyncStatus('ok');
    }catch(e){ setSyncStatus('error'); }
  };

  // ── STATE HELPERS ────────────────────────────────────
  const reg     = db.registros[fecha]||{};
  const cerrado = !!reg.cerrado;
  const ovRel   = reg.overrideRel??null;
  const tipo    = tipoRel(fecha,ovRel);
  const calc    = calcDia(INSUMOS,reg,tipo);
  const filtrado= calc.filter(i=>!busq||i.nombreCorto.toLowerCase().includes(busq.toLowerCase())||i.codigo.includes(busq)||(i.nombre&&i.nombre.toLowerCase().includes(busq.toLowerCase())));

  const showToast=(msg,t='ok')=>{setToast({msg,t});setTimeout(()=>setToast(null),3000);};

  const setVal=(campo,id,v)=>{
    const val=Math.max(0,Number(v));
    setDb(d=>({...d,registros:{...d.registros,[fecha]:{...d.registros[fecha],[campo]:{...(d.registros[fecha]?.[campo]||{}),[id]:val}}}}));
  };

  const setOverride=val=>setDb(d=>({...d,registros:{...d.registros,[fecha]:{...d.registros[fecha],overrideRel:val}}}));

  const cerrarDia=()=>{
    // Generar remisión del día con lo que realmente se recibió
    const regActual = db.registros[fecha]||{};
    const remisionItems = INSUMOS.map(ins=>{
      const rec = regActual.recibido?.[ins.id]??0;
      if(rec<=0) return null;
      return {
        codigo:   ins.codigo,
        nombre:   ins.nombre,
        nombreCorto: ins.nombreCorto,
        unidad:   ins.unidad,
        cantidad: rec,
        precio:   ins.precio,
        subtotal: rec * ins.precio,
      };
    }).filter(Boolean);

    const totalRemision = remisionItems.reduce((s,i)=>s+i.subtotal,0);

    // Guardar remisión en el registro del día
    setDb(d=>({...d,registros:{...d.registros,[fecha]:{
      ...d.registros[fecha],
      cerrado:true,
      remision:{
        fecha,
        items: remisionItems,
        total: totalRemision,
        generada: new Date().toISOString(),
      }
    }}}));
    showToast('✅ Día cerrado — remisión generada');
    setFase('cierre'); setShowCierre(false);
  };

  const guardarEdit=()=>{
    if(!formEdit.id) return;
    const insumos=db.insumos.map(i=>i.id===formEdit.id?{...formEdit,stockES:+formEdit.stockES,stockFS:+formEdit.stockFS,precio:+formEdit.precio}:i);
    setDb(d=>({...d,insumos}));
    if(configOk()) apiPost('guardarInsumos',{insumos}).catch(()=>{});
    showToast('✅ Guardado'); setModEdit(null);
  };

  const handleExportar=()=>{ exportarExcel(fecha,db.insumos,reg,tipo); showToast('📥 Excel descargado'); };

  const handleImportar=e=>{
    const f=e.target.files[0]; if(!f) return;
    setImportando(true); setImportRes(null);
    importarExcel(f,result=>{
      setImportando(false);
      if(result.error){setImportRes({error:result.error});showToast('❌ '+result.error,'err');return;}
      setDb(d=>({...d,registros:{...d.registros,[fecha]:{...d.registros[fecha],conteoFin:{...(d.registros[fecha]?.conteoFin||{}),...result.data}}}}));
      setImportRes({ok:true,n:result.n});
      showToast(`✅ ${result.n} existencias cargadas`);
      setFase('conteo');
    });
    e.target.value='';
  };

  const handlePDF=async e=>{
    const files=[...e.target.files]; if(!files.length) return;
    setProcesandoPDF(true);
    await procesarRemisiones(files, result=>{
      setProcesandoPDF(false);
      if(result.error){showToast('❌ '+result.error,'err');return;}
      // Sumar a recibido existente
      setDb(d=>{
        const regActual=d.registros[fecha]||{};
        const recActual=regActual.recibido||{};
        const nuevoRec={...recActual};
        Object.entries(result.data).forEach(([id,cant])=>{
          nuevoRec[id]=(nuevoRec[id]||0)+cant;
        });
        return {...d,registros:{...d.registros,[fecha]:{...regActual,recibido:nuevoRec}}};
      });
      // Guardar detalle de remisiones
      setRemisiones(prev=>[...prev,...result.detalle.map(d=>({...d,fecha:new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}))]);
      showToast(`✅ ${files.length} remisión(es) · ${result.totalItems} insumos sumados`);
      setFase('recibido');
    });
    e.target.value='';
  };

  const guardarScriptUrl=()=>{
    setScriptUrl(scriptUrlInput);
    showToast('✅ URL guardada — probando conexión...');
    setShowConfig(false);
    setTimeout(()=>cargarDia(fecha),500);
  };

  // KPIs
  const conConteo  = calc.filter(i=>i.fin!==null).length;
  const sinConteo  = calc.length-conConteo;
  const alertas    = calc.filter(i=>i.fin!==null&&i.fin<i.rel*0.25).length;
  const totalPedir = calc.reduce((s,i)=>s+i.pedir,0);
  const costoPedir = calc.reduce((s,i)=>s+i.pedir*i.precio,0);

  const FASES=[{id:'inicio',icon:'🌅',l:'Inicio'},{id:'recibido',icon:'📥',l:'Recibido'},{id:'conteo',icon:'🔢',l:'Conteo'},{id:'cierre',icon:'🌙',l:'Cierre'}];
  const NAV=[{id:'dia',icon:'📅',l:'Hoy'},{id:'pedido',icon:'🛒',l:'Pedido'},{id:'remision',icon:'📄',l:'Remisión'},{id:'historial',icon:'📊',l:'Historial'},{id:'catalogo',icon:'⚙️',l:'Config'}];

  // Indicador de sync
  const SyncDot = () => (
    <div style={{width:8,height:8,borderRadius:'50%',background:
      syncing?'#f97316':syncStatus==='ok'?'#22c55e':syncStatus==='error'?'#ef4444':'#475569',
      ...(syncing?{animation:'pulse 1s ease infinite'}:{})}}/>
  );

  // ── MENÚ PRINCIPAL ──────────────────────────────────
  if(!rutaId){
    const hoy = new Date().getDay(); // 0=Dom,1=Lun,...,6=Sáb
    const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    return (
      <div style={{minHeight:'100dvh',background:'#08101e',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 20px'}}>
        <div style={{width:64,height:64,borderRadius:16,background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,marginBottom:16}}>❄️</div>
        <div style={{fontWeight:800,fontSize:22,color:'#e2ecf8',marginBottom:4}}>RellenApp <span style={{color:'#60a5fa'}}>XOXO</span></div>
        <div style={{fontSize:12,color:'#475569',marginBottom:32,fontFamily:'DM Mono,monospace'}}>SUCURSAL XOXO · {DIAS[hoy]} {diaCorto(HOY)}</div>

        <div style={{width:'100%',maxWidth:400,display:'flex',flexDirection:'column',gap:14}}>
          {RUTAS_CONFIG.map(ruta=>{
            const esDiaActivo = ruta.diasPedido===null || ruta.diasPedido.includes(hoy);
            const diasNombre  = ruta.diasPedido===null ? 'Todos los días'
              : ruta.diasPedido.map(d=>DIAS[d]).join(' y ');
            return (
              <button key={ruta.id} onClick={()=>setRutaId(ruta.id)}
                style={{width:'100%',borderRadius:16,border:`2px solid ${esDiaActivo?ruta.color:'#1a3050'}`,
                  background:esDiaActivo?ruta.colorDark+'33':'#0d1b33',
                  padding:'18px 20px',textAlign:'left',cursor:'pointer',
                  display:'flex',alignItems:'center',gap:16,
                  opacity:esDiaActivo?1:0.6}}>
                <div style={{width:48,height:48,borderRadius:12,background:esDiaActivo?ruta.color:'#1a3050',
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
                  {ruta.emoji}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:16,color:'#e2ecf8',marginBottom:2}}>{ruta.nombre}</div>
                  <div style={{fontSize:11,color:'#64748b'}}>{ruta.descripcion}</div>
                  <div style={{fontSize:10,marginTop:4,fontFamily:'DM Mono,monospace',
                    color:esDiaActivo?ruta.color:'#475569',fontWeight:600}}>
                    {esDiaActivo?'● Pedido hoy':'○ '+diasNombre}
                  </div>
                </div>
                <div style={{fontSize:22,color:esDiaActivo?ruta.color:'#475569'}}>›</div>
              </button>
            );
          })}
        </div>
        <div style={{marginTop:24,fontSize:10,color:'#475569',textAlign:'center'}}>
          Las rutas sin pedido hoy se muestran atenuadas<br/>pero puedes entrar igualmente
        </div>
      </div>
    );
  }

  return (
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',background:'#08101e',overflow:'hidden'}}>

      {/* TOAST */}
      {toast&&<div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:9999,
        background:toast.t==='ok'?'#14532d':toast.t==='warn'?'#78350f':'#7f1d1d',
        color:'#fff',padding:'12px 22px',borderRadius:14,fontWeight:700,fontSize:14,
        boxShadow:'0 6px 28px rgba(0,0,0,.6)',maxWidth:'88vw',textAlign:'center'}}>
        {toast.msg}
      </div>}

      <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleImportar} style={{display:'none'}}/>
      <input ref={pdfRef} type="file" accept=".pdf" multiple onChange={handlePDF} style={{display:'none'}}/>

      {/* MODAL EDITAR INSUMO */}
      {modEdit&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:1000,display:'flex',alignItems:'flex-end'}}>
          <div style={{background:'#0d1b33',borderRadius:'20px 20px 0 0',padding:'24px 20px 40px',
            width:'100%',border:'1px solid #1a3050',maxHeight:'80vh',overflowY:'auto'}}>
            <div style={{fontWeight:800,fontSize:16,color:'#60a5fa',marginBottom:2}}>✏️ Editar insumo</div>
            <div style={{fontSize:11,color:'#475569',marginBottom:20,fontFamily:'DM Mono,monospace'}}>{formEdit.codigo} · {formEdit.nombre}</div>
            {[['precio','Precio unitario ($)'],['stockES','Rellenable Entre Semana'],['stockFS','Rellenable Fin de Semana']].map(([k,l])=>(
              <div key={k} style={{marginBottom:16}}>
                <div style={{fontSize:12,color:'#64748b',marginBottom:6,fontWeight:600}}>{l}</div>
                <input type="number" inputMode="decimal" step="0.01" value={formEdit[k]??0}
                  onChange={e=>setFormEdit(f=>({...f,[k]:e.target.value}))}
                  style={{width:'100%',height:56,borderRadius:12,border:'2px solid #1e3a5f',
                    background:'#162035',color:'#e2ecf8',fontSize:24,fontWeight:700,
                    textAlign:'center',fontFamily:'DM Mono,monospace',padding:0}}/>
              </div>
            ))}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:8}}>
              <button onClick={guardarEdit} style={{height:54,borderRadius:14,border:'none',background:'#3b82f6',color:'#fff',fontSize:16,fontWeight:800}}>💾 Guardar</button>
              <button onClick={()=>setModEdit(null)} style={{height:54,borderRadius:14,border:'2px solid #1e3a5f',background:'transparent',color:'#64748b',fontSize:16,fontWeight:700}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL CERRAR DÍA */}
      {showCierre&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{background:'#0d1b33',borderRadius:20,padding:24,width:'100%',maxWidth:360,border:'1px solid #1a3050'}}>
            <div style={{fontSize:36,marginBottom:12,textAlign:'center'}}>🔒</div>
            <div style={{fontWeight:800,fontSize:18,marginBottom:8,textAlign:'center'}}>¿Cerrar el día?</div>
            <div style={{fontSize:13,color:'#94a3b8',marginBottom:24,textAlign:'center',lineHeight:1.6}}>
              {sinConteo>0?`Faltan ${sinConteo} insumo(s) sin conteo. `:'Todos los insumos tienen conteo. '}
              Al cerrar se genera el pedido de mañana y el día queda bloqueado.
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <button onClick={cerrarDia} style={{height:56,borderRadius:14,border:'none',background:'#14532d',color:'#86efac',fontSize:16,fontWeight:800}}>✅ Cerrar</button>
              <button onClick={()=>setShowCierre(false)} style={{height:56,borderRadius:14,border:'2px solid #1e3a5f',background:'transparent',color:'#64748b',fontSize:16,fontWeight:700}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL CONFIGURAR URL */}
      {showConfig&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:1000,display:'flex',alignItems:'flex-end'}}>
          <div style={{background:'#0d1b33',borderRadius:'20px 20px 0 0',padding:'24px 20px 40px',width:'100%',border:'1px solid #1a3050'}}>
            <div style={{fontWeight:800,fontSize:16,color:'#60a5fa',marginBottom:8}}>🔗 Conectar con Google Sheets</div>
            <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6,marginBottom:20}}>
              Pega aquí la URL de tu Google Apps Script para que los datos se guarden en la nube y puedas acceder desde cualquier dispositivo.
            </div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:6,fontWeight:600}}>URL DEL APPS SCRIPT</div>
            <input value={scriptUrlInput} onChange={e=>setScriptUrlInput(e.target.value)}
              placeholder="https://script.google.com/macros/s/.../exec"
              style={{width:'100%',height:52,borderRadius:12,border:'2px solid #1e3a5f',
                background:'#162035',color:'#e2ecf8',fontSize:13,padding:'0 14px',marginBottom:20,
                fontFamily:'DM Mono,monospace'}}/>
            <div style={{background:'#08101e',borderRadius:12,padding:'12px 14px',marginBottom:20,border:'1px solid #1a3050'}}>
              <div style={{fontWeight:700,fontSize:12,color:'#fbbf24',marginBottom:6}}>📋 Pasos para obtener tu URL:</div>
              {['1. Abre tu Google Sheet','2. Ve a Extensiones → Apps Script','3. Pega el código del archivo RellenApp_Script.gs','4. Haz clic en Implementar → Nueva implementación','5. Tipo: "Aplicación web" · Acceso: "Cualquier persona"','6. Copia la URL que aparece y pégala aquí'].map((s,i)=>(
                <div key={i} style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>{s}</div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <button onClick={guardarScriptUrl} style={{height:54,borderRadius:14,border:'none',background:'#3b82f6',color:'#fff',fontSize:15,fontWeight:800}}>💾 Guardar URL</button>
              <button onClick={()=>setShowConfig(false)} style={{height:54,borderRadius:14,border:'2px solid #1e3a5f',background:'transparent',color:'#64748b',fontSize:15,fontWeight:700}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{background:'linear-gradient(180deg,#0d1f38,#0a1628)',borderBottom:'1px solid #1a3050',padding:'12px 16px 10px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={()=>setRutaId(null)}
              style={{width:36,height:36,borderRadius:10,background:rutaConfig?rutaConfig.color:'linear-gradient(135deg,#3b82f6,#1d4ed8)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
              {rutaConfig?rutaConfig.emoji:'❄️'}
            </button>
            <div>
              <div style={{fontWeight:800,fontSize:16,lineHeight:1}}>RellenApp <span style={{color:rutaConfig?rutaConfig.color:'#60a5fa'}}>XOXO</span></div>
              <div style={{fontSize:10,color:'#64748b',marginBottom:1}}>{rutaConfig?.nombre||'Ruta Fría'}</div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <SyncDot/>
                <span style={{fontSize:9,color:'#475569'}}>
                  {syncing?'Sincronizando...':syncStatus==='ok'?'Sincronizado ✓':configOk()?'Sin conexión':'Sin configurar'}
                </span>
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {configOk()&&(
              <button onClick={cargarTodo}
                style={{width:36,height:36,borderRadius:10,border:'1px solid #1e3a5f',background:'#162035',color:'#60a5fa',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span className={syncing?'spin':''}>🔄</span>
              </button>
            )}
            <button onClick={()=>setShowDatePick(p=>!p)}
              style={{background:'#162035',border:'1px solid #1e3a5f',borderRadius:10,padding:'7px 12px',color:'#93c5fd',fontSize:12,fontWeight:700}}>
              📅 {diaCorto(fecha)}
            </button>
          </div>
        </div>

        {showDatePick&&(
          <div style={{marginBottom:8}}>
            <input type="date" value={fecha} onChange={e=>{setFecha(e.target.value);setShowDatePick(false);}}
              style={{width:'100%',height:48,borderRadius:12,border:'2px solid #3b82f6',background:'#162035',
                color:'#e2ecf8',fontSize:16,textAlign:'center',fontFamily:'DM Mono,monospace',padding:'0 12px'}}/>
          </div>
        )}

        {/* Toggle rellenable + estado */}
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{padding:'3px 8px',borderRadius:10,fontSize:10,fontWeight:700,
            background:cerrado?'#14532d':'#162035',color:cerrado?'#86efac':'#60a5fa'}}>
            {cerrado?'🔒':'🟢'} {cerrado?'CERRADO':'ABIERTO'}
          </div>
          <div style={{flex:1,display:'flex',alignItems:'center',gap:7,background:'#0a1628',
            borderRadius:10,padding:'6px 10px',border:'1px solid #1a3050',justifyContent:'center'}}>
            <span style={{fontSize:11,fontWeight:700,color:tipo==='ES'?'#93c5fd':'#475569'}}>ES</span>
            <label className="tog">
              <input type="checkbox" checked={tipo==='FS'} onChange={e=>setOverride(e.target.checked?'FS':'ES')}/>
              <span className="sli"/>
            </label>
            <span style={{fontSize:11,fontWeight:700,color:tipo==='FS'?'#fb923c':'#475569'}}>FS</span>
            <span style={{fontSize:10,fontWeight:700,color:tipo==='FS'?'#fb923c':'#93c5fd',marginLeft:2}}>
              {tipo==='FS'?'🍊 FIN SEMANA':'📘 ENTRE SEMANA'}
              {ovRel===null&&<span style={{fontSize:8,opacity:.5}}> auto</span>}
            </span>
            {ovRel!==null&&<button onClick={()=>setOverride(null)} style={{fontSize:9,color:'#64748b',background:'none',border:'none',textDecoration:'underline'}}>auto</button>}
          </div>
        </div>
      </div>

      {/* NAV BOTTOM */}
      <div style={{order:10,background:'#0d1b33',borderTop:'1px solid #1a3050',display:'flex',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setVista(n.id)}
            style={{flex:1,padding:'10px 4px 8px',border:'none',background:'transparent',
              borderTop:`3px solid ${vista===n.id?'#3b82f6':'transparent'}`,
              color:vista===n.id?'#60a5fa':'#64748b',fontWeight:700,fontSize:10}}>
            <div style={{fontSize:20}}>{n.icon}</div>
            <div style={{marginTop:2}}>{n.l}</div>
          </button>
        ))}
      </div>

      {/* CONTENIDO */}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'12px 14px 16px'}}>

        {/* ══ DÍA ══ */}
        {vista==='dia'&&(
          <div className="fu">
            {/* Banner configuración si no hay URL */}
            {!configOk()&&(
              <div style={{background:'#1c1700',border:'1px solid #f59e0b',borderRadius:14,padding:'14px',marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:13,color:'#fbbf24',marginBottom:4}}>⚠️ Sin sincronización con Google Sheets</div>
                <div style={{fontSize:11,color:'#d97706',lineHeight:1.5,marginBottom:10}}>
                  Los datos se guardan solo en este dispositivo. Para sincronizar entre celular y computadora, configura tu Apps Script.
                </div>
                <button onClick={()=>setShowConfig(true)}
                  style={{height:44,padding:'0 18px',borderRadius:12,border:'none',background:'#f59e0b',color:'#1c1700',fontSize:13,fontWeight:800}}>
                  🔗 Configurar Google Sheets
                </button>
              </div>
            )}

            {/* KPIs */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:14}}>
              {[[conConteo+'/'+calc.length,'Conteos','#3b82f6'],[alertas||'—','Alertas',alertas?'#ef4444':'#1e3a5f'],[totalPedir,'A pedir','#22c55e'],[costoPedir>0?'$'+Math.round(costoPedir):'—','Costo','#f97316']].map(([v,l,c])=>(
                <div key={l} style={{background:'#0d1b33',borderRadius:12,border:'1px solid #1a3050',padding:'10px 4px',textAlign:'center'}}>
                  <div style={{fontWeight:800,fontSize:13,color:c,fontFamily:'DM Mono,monospace'}}>{v}</div>
                  <div style={{fontSize:8,color:'#475569',marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>

            {/* Fases — 4 pasos */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6,marginBottom:12}}>
              {FASES.map(f=>{
                const colors = {inicio:'#64748b',recibido:'#3b82f6',conteo:'#f97316',cierre:'#22c55e'};
                const c = colors[f.id]||'#3b82f6';
                return (
                  <button key={f.id} onClick={()=>setFase(f.id)}
                    style={{height:54,borderRadius:12,border:`2px solid ${fase===f.id?c:'#1a3050'}`,
                      background:fase===f.id?c:'#0d1b33',color:fase===f.id?'#fff':'#64748b',
                      fontSize:10,fontWeight:700,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
                    <span style={{fontSize:16}}>{f.icon}</span><span>{f.l}</span>
                  </button>
                );
              })}
            </div>

            {/* REMISIONES PDF */}
            <div style={{background:'#0a1020',border:'1px solid #3b82f6',borderRadius:14,padding:'12px 14px',marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div style={{fontWeight:700,fontSize:12,color:'#60a5fa'}}>📄 Remisiones PDF</div>
                {remisiones.length>0&&<button onClick={()=>setShowRemisiones(p=>!p)} style={{fontSize:10,color:'#60a5fa',background:'none',border:'none',textDecoration:'underline'}}>{showRemisiones?'Ocultar':'Ver detalle'} ({remisiones.length})</button>}
              </div>
              <div style={{fontSize:11,color:'#93c5fd',marginBottom:10,lineHeight:1.5}}>
                Sube una o varias remisiones — los insumos se suman automáticamente al recibido del día.
              </div>
              <button onClick={()=>pdfRef.current.click()} disabled={cerrado||procesandoPDF}
                style={{width:'100%',height:48,borderRadius:12,border:`2px solid ${cerrado?'#1a3050':'#3b82f6'}`,
                  background:cerrado?'transparent':'#1d4ed8',color:cerrado?'#475569':'#fff',
                  fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                {procesandoPDF?<span style={{width:16,height:16,borderRadius:'50%',border:'2px solid #fff',borderTopColor:'transparent',display:'inline-block',animation:'spin .7s linear infinite'}}/>:'📄'}
                {procesandoPDF?'Leyendo remisiones...':cerrado?'Día cerrado':'Subir remisión(es) PDF'}
              </button>
              {/* Detalle de remisiones cargadas */}
              {showRemisiones&&remisiones.length>0&&(
                <div style={{marginTop:10,borderTop:'1px solid #1e3a5f',paddingTop:10}}>
                  {remisiones.map((r,i)=>(
                    <div key={i} style={{marginBottom:8,background:'#162035',borderRadius:8,padding:'8px 10px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <div style={{fontSize:11,fontWeight:700,color:'#60a5fa'}}>{r.tipo||'Doc'} · {r.nombre}</div>
                        <div style={{fontSize:10,color:'#475569'}}>{r.fecha} · {r.items} insumos</div>
                      </div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                        {Object.entries(r.data).map(([id,cant])=>{
                          const ins=INSUMOS_BASE.find(x=>x.id===+id);
                          return ins?(
                            <span key={id} style={{padding:'2px 7px',borderRadius:10,fontSize:10,background:'#1e3a5f',color:'#93c5fd'}}>
                              {ins.nombreCorto}: +{fmt2(cant)}
                            </span>
                          ):null;
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Importar Excel */}
            <div style={{background:'#0a1a10',border:'1px solid #166534',borderRadius:14,padding:'12px 14px',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:12,color:'#4ade80',marginBottom:6}}>📊 Importar existencias desde Excel</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <button onClick={handleExportar} style={{height:48,borderRadius:12,border:'none',background:'#166534',color:'#fff',fontSize:13,fontWeight:700}}>📥 Exportar</button>
                <button onClick={()=>fileRef.current.click()} disabled={cerrado||importando}
                  style={{height:48,borderRadius:12,border:`2px solid ${cerrado?'#1a3050':'#1d4ed8'}`,background:cerrado?'transparent':'#1d4ed8',color:cerrado?'#475569':'#fff',fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  {importando?<span style={{width:16,height:16,borderRadius:'50%',border:'2px solid #fff',borderTopColor:'transparent',display:'inline-block',animation:'spin .7s linear infinite'}}/>:'📤'}
                  {importando?'Cargando...':cerrado?'Cerrado':'Importar'}
                </button>
              </div>
              {importRes&&<div style={{marginTop:8,fontSize:11,fontWeight:600,color:importRes.ok?'#4ade80':'#f87171',textAlign:'center'}}>{importRes.ok?`✅ ${importRes.n} existencias cargadas`:`❌ ${importRes.error}`}</div>}
            </div>

            {/* Cerrar día */}
            {!cerrado&&<button onClick={()=>setShowCierre(true)} style={{width:'100%',height:52,borderRadius:14,border:'2px solid #166534',background:'#0a1a10',color:'#86efac',fontSize:15,fontWeight:800,marginBottom:8}}>🔒 Cerrar día y generar remisión</button>}
          {cerrado&&reg.remision&&(
            <button onClick={()=>setVista('remision')}
              style={{width:'100%',height:48,borderRadius:14,border:'2px solid #166534',
                background:'#0a1a10',color:'#4ade80',fontSize:14,fontWeight:700,marginBottom:8,
                display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              📄 Ver remisión del día
            </button>
          )}

            {/* Búsqueda */}
            <input value={busq} onChange={e=>setBusq(e.target.value)} placeholder="🔍 Buscar insumo..." inputMode="search"
              style={{width:'100%',height:48,borderRadius:12,border:'1px solid #1a3050',background:'#0d1b33',color:'#e2ecf8',fontSize:15,padding:'0 16px',marginBottom:12}}/>

            {filtrado.map(ins=><InsCard key={ins.id} ins={ins} fase={fase} reg={reg} cerrado={cerrado} tipo={tipo} onSet={setVal}/>)}
          </div>
        )}

        {/* ══ PEDIDO ══ */}
        {vista==='pedido'&&(
          <div className="fu">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontWeight:800,fontSize:17,color:'#22c55e'}}>🛒 Pedido</div>
              <button onClick={handleExportar} style={{height:40,padding:'0 14px',borderRadius:10,border:'none',background:'#14532d',color:'#86efac',fontSize:13,fontWeight:700}}>📥 Exportar</button>
            </div>
            <div style={{background:tipo==='FS'?'#2c1000':'#0c1e33',border:`1px solid ${tipo==='FS'?'#c2410c':'#1d4ed8'}`,borderRadius:12,padding:'10px 14px',marginBottom:14,fontSize:12,color:tipo==='FS'?'#fb923c':'#93c5fd',fontWeight:600}}>
              {tipo==='FS'?'🍊 Rellenable FIN DE SEMANA':'📘 Rellenable ENTRE SEMANA'} · {diaCorto(fecha)}
            </div>
            {calc.filter(i=>i.pedir>0).map(ins=>(
              <div key={ins.id} style={{background:'#0d1b33',borderRadius:14,border:'1px solid #1a3050',padding:'14px',marginBottom:8,display:'flex',alignItems:'center',gap:14}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{ins.nombreCorto}</div>
                  <div style={{fontSize:10,color:'#475569',fontFamily:'DM Mono,monospace',marginTop:2}}>{ins.codigo} · Exist:{fmt2(ins.fin??ins.ini)} → Rel:{ins.rel}</div>
                </div>
                <div style={{textAlign:'center',minWidth:60}}>
                  <div style={{fontFamily:'DM Mono,monospace',fontWeight:900,fontSize:32,color:'#4ade80',lineHeight:1}}>{ins.pedir}</div>
                  <div style={{fontSize:10,color:'#475569'}}>{ins.unidad}</div>
                  <div style={{fontSize:11,color:'#f97316',fontFamily:'DM Mono,monospace',marginTop:2}}>{ins.precio>0?fmt$(ins.pedir*ins.precio):'—'}</div>
                </div>
              </div>
            ))}
            <div style={{background:'#0a1a10',border:'1px solid #166534',borderRadius:14,padding:'16px',marginTop:8}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div style={{textAlign:'center'}}><div style={{fontSize:11,color:'#475569',marginBottom:4}}>PIEZAS A PEDIR</div><div style={{fontFamily:'DM Mono,monospace',fontWeight:900,fontSize:34,color:'#4ade80'}}>{totalPedir}</div></div>
                <div style={{textAlign:'center'}}><div style={{fontSize:11,color:'#475569',marginBottom:4}}>COSTO ESTIMADO</div><div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:20,color:'#f97316',marginTop:4}}>{costoPedir>0?fmt$(costoPedir):'—'}</div></div>
              </div>
            </div>
            {calc.filter(i=>i.pedir===0).length>0&&(
              <div style={{marginTop:10,background:'#0d1b33',borderRadius:12,border:'1px solid #1a3050',padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'#475569',marginBottom:8}}>✅ Stock suficiente — no pedir:</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {calc.filter(i=>i.pedir===0).map(i=><span key={i.id} style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:'#0c2340',color:'#4ade80'}}>{i.nombreCorto}</span>)}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ REMISIÓN DEL DÍA (modal/panel) ══ */}
      {vista==='remision'&&(
        <div className="fu">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <div style={{fontWeight:800,fontSize:17,color:'#4ade80'}}>📄 Remisión del día</div>
              <div style={{fontSize:11,color:'#475569',marginTop:2,fontFamily:'DM Mono,monospace'}}>{diaNombre(fecha)}</div>
            </div>
            <button onClick={()=>exportarRemision(fecha,reg.remision,rutaConfig?.nombre)}
              disabled={!reg.remision}
              style={{height:40,padding:'0 14px',borderRadius:10,border:'none',
                background:reg.remision?'#166534':'#1a3050',
                color:reg.remision?'#86efac':'#475569',fontSize:13,fontWeight:700}}>
              📥 Descargar Excel
            </button>
          </div>

          {!reg.remision?(
            <div style={{background:'#0d1b33',borderRadius:14,border:'1px solid #1a3050',padding:24,textAlign:'center'}}>
              <div style={{fontSize:32,marginBottom:12}}>📋</div>
              <div style={{fontWeight:700,fontSize:14,color:'#64748b',marginBottom:6}}>Sin remisión para este día</div>
              <div style={{fontSize:12,color:'#475569',lineHeight:1.5,marginBottom:16}}>
                La remisión se genera automáticamente al cerrar el día.<br/>
                {!cerrado&&'Cierra el día para generarla.'}
              </div>
              {/* Botón para generar remisión manualmente desde el recibido */}
              {Object.keys(reg.recibido||{}).length>0&&(
                <button onClick={()=>{
                  const remisionItems = INSUMOS.map(ins=>{
                    const rec = reg.recibido?.[ins.id]??0;
                    if(rec<=0) return null;
                    return {
                      codigo: ins.codigo, nombre: ins.nombre,
                      nombreCorto: ins.nombreCorto, unidad: ins.unidad,
                      cantidad: rec, precio: ins.precio, subtotal: rec*ins.precio,
                    };
                  }).filter(Boolean);
                  const total = remisionItems.reduce((s,i)=>s+i.subtotal,0);
                  setDb(d=>({...d,registros:{...d.registros,[fecha]:{
                    ...d.registros[fecha],
                    remision:{fecha, items:remisionItems, total, generada:new Date().toISOString()}
                  }}}));
                  showToast('✅ Remisión generada desde el recibido');
                }}
                style={{width:'100%',height:48,borderRadius:12,border:'2px solid #3b82f6',
                  background:'#162035',color:'#60a5fa',fontSize:14,fontWeight:700}}>
                  📄 Generar remisión desde recibido
                </button>
              )}
            </div>
          ):(
            <div>
              {/* Resumen */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
                <div style={{background:'#0d1b33',borderRadius:12,border:'1px solid #1a3050',padding:'12px',textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#475569',marginBottom:4}}>INSUMOS</div>
                  <div style={{fontFamily:'DM Mono,monospace',fontWeight:800,fontSize:24,color:'#4ade80'}}>{reg.remision.items.length}</div>
                </div>
                <div style={{background:'#0d1b33',borderRadius:12,border:'1px solid #1a3050',padding:'12px',textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#475569',marginBottom:4}}>COSTO TOTAL</div>
                  <div style={{fontFamily:'DM Mono,monospace',fontWeight:800,fontSize:18,color:'#f97316',marginTop:2}}>
                    {reg.remision.total>0?fmt$(reg.remision.total):'Sin precios'}
                  </div>
                </div>
              </div>

              {/* Lista de insumos */}
              {reg.remision.items.map((item,i)=>(
                <div key={i} style={{background:'#0d1b33',borderRadius:12,border:'1px solid #1a3050',
                  padding:'12px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13}}>{item.nombreCorto||item.nombre}</div>
                    <div style={{fontSize:10,color:'#475569',fontFamily:'DM Mono,monospace',marginTop:2}}>
                      {item.codigo} · {item.unidad} · {fmt$(item.precio)}
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'DM Mono,monospace',fontWeight:800,fontSize:20,color:'#60a5fa'}}>{fmt2(item.cantidad)}</div>
                    <div style={{fontSize:11,color:'#f97316',fontFamily:'DM Mono,monospace'}}>
                      {item.precio>0?fmt$(item.subtotal):'—'}
                    </div>
                  </div>
                </div>
              ))}

              <div style={{background:'#0a1a10',border:'1px solid #166534',borderRadius:12,padding:'14px',marginTop:4}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{fontWeight:700,fontSize:13,color:'#4ade80'}}>TOTAL DEL DÍA</div>
                  <div style={{fontFamily:'DM Mono,monospace',fontWeight:900,fontSize:22,color:'#f97316'}}>
                    {reg.remision.total>0?fmt$(reg.remision.total):'—'}
                  </div>
                </div>
                <div style={{fontSize:9,color:'#475569',marginTop:4,fontFamily:'DM Mono,monospace'}}>
                  Generada: {new Date(reg.remision.generada||Date.now()).toLocaleString('es-MX')}
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ══ HISTORIAL ══ */}
        {vista==='historial'&&(
          <div className="fu">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:17,color:'#60a5fa'}}>📊 Historial</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>exportarReporteSemanal(db.registros,INSUMOS,rutaConfig?.nombre)}
                  style={{height:38,padding:'0 12px',borderRadius:10,border:'1px solid #166534',background:'#0a1a10',color:'#4ade80',fontSize:11,fontWeight:700}}>
                  📈 Reporte semanal
                </button>
                {configOk()&&<button onClick={cargarTodo} style={{height:38,padding:'0 12px',borderRadius:10,border:'1px solid #1e3a5f',background:'#162035',color:'#60a5fa',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:4}}><span className={syncing?'spin':''}>🔄</span></button>}
              </div>
            </div>
            {Object.entries(db.registros).sort(([a],[b])=>b.localeCompare(a)).map(([f,r])=>{
              const tr=tipoRel(f,r.overrideRel??null);
              const c=calcDia(INSUMOS,r,tr);
              const nC=c.filter(i=>i.fin!==null).length;
              const tP=c.reduce((s,i)=>s+i.pedir,0);
              const tCosto=c.reduce((s,i)=>s+i.pedir*i.precio,0);
              return (
                <button key={f} onClick={()=>{setFecha(f);setVista(r.remision?'remision':'dia');}}
                  style={{width:'100%',background:'#0d1b33',borderRadius:14,border:'1px solid #1a3050',padding:'14px',marginBottom:10,textAlign:'left'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,textTransform:'capitalize'}}>{diaNombre(f)}</div>
                      <div style={{fontSize:10,color:'#475569',fontFamily:'DM Mono,monospace',marginTop:2}}>{f} · {tr==='FS'?'🍊 FS':'📘 ES'}</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                      <div style={{padding:'4px 10px',borderRadius:10,fontSize:11,fontWeight:700,background:r.cerrado?'#14532d':'#162035',color:r.cerrado?'#86efac':'#60a5fa'}}>{r.cerrado?'🔒 Cerrado':'🟢 Abierto'}</div>
                      {r.remision&&<div style={{padding:'2px 8px',borderRadius:8,fontSize:9,fontWeight:700,background:'#0c2a18',color:'#4ade80'}}>📄 Remisión</div>}
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                    {[[nC+'/'+c.length,'Conteos','#3b82f6'],[tP,'A pedir','#22c55e'],[tCosto>0?'$'+Math.round(tCosto):'—','Costo','#f97316']].map(([v,l,col])=>(
                      <div key={l} style={{background:'#08101e',borderRadius:8,padding:'8px 4px',textAlign:'center'}}>
                        <div style={{fontWeight:800,fontSize:13,color:col,fontFamily:'DM Mono,monospace'}}>{v}</div>
                        <div style={{fontSize:9,color:'#475569',marginTop:2}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </button>
              );
            })}
            {!Object.keys(db.registros).length&&<div style={{textAlign:'center',color:'#475569',padding:48,fontSize:14}}>Sin historial aún.</div>}
          </div>
        )}

        {/* ══ CONFIG ══ */}
        {vista==='catalogo'&&(
          <div className="fu">
            <div style={{fontWeight:800,fontSize:17,color:'#60a5fa',marginBottom:14}}>⚙️ Configuración</div>

            {/* Google Sheets */}
            <div style={{background:'#08101e',border:`1px solid ${configOk()?'#166534':'#f59e0b'}`,borderRadius:14,padding:'14px',marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:13,color:configOk()?'#4ade80':'#fbbf24',marginBottom:4}}>
                {configOk()?'✅ Google Sheets conectado':'⚠️ Google Sheets sin configurar'}
              </div>
              <div style={{fontSize:11,color:'#64748b',marginBottom:12,fontFamily:'DM Mono,monospace',wordBreak:'break-all'}}>
                {scriptUrl||'Sin URL configurada'}
              </div>
              <button onClick={()=>setShowConfig(true)}
                style={{height:44,padding:'0 18px',borderRadius:12,border:`1px solid ${configOk()?'#166534':'#f59e0b'}`,background:'transparent',color:configOk()?'#4ade80':'#fbbf24',fontSize:13,fontWeight:700}}>
                🔗 {configOk()?'Cambiar URL':'Configurar URL'}
              </button>
            </div>

            {/* Catálogo */}
            <div style={{fontWeight:700,fontSize:14,color:'#e2ecf8',marginBottom:8}}>📦 Insumos — editar precio y rellenables</div>
            <input value={busq} onChange={e=>setBusq(e.target.value)} placeholder="🔍 Buscar..." inputMode="search"
              style={{width:'100%',height:48,borderRadius:12,border:'1px solid #1a3050',background:'#0d1b33',color:'#e2ecf8',fontSize:15,padding:'0 16px',marginBottom:12}}/>
            {INSUMOS.filter(i=>!busq||i.nombreCorto.toLowerCase().includes(busq.toLowerCase())||i.codigo.includes(busq)).map(ins=>(
              <button key={ins.id} onClick={()=>{setFormEdit({...ins});setModEdit(ins);}}
                style={{width:'100%',background:'#0d1b33',borderRadius:14,border:'1px solid #1a3050',padding:'14px',marginBottom:8,textAlign:'left',display:'flex',alignItems:'center',gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{ins.nombreCorto}</div>
                  <div style={{fontSize:11,color:'#475569',fontFamily:'DM Mono,monospace',marginTop:3}}>
                    {ins.codigo} · {fmt$(ins.precio)} · ES:{ins.stockES} · FS:{ins.stockFS}
                  </div>
                </div>
                <div style={{fontSize:22}}>✏️</div>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
